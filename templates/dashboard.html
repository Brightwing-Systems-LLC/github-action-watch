{% extends "base.html" %}
{% block title %}Dashboard · Actions Dashboard{% endblock %}

{% block content %}
<div class="dashboard-page">
    <div class="dash-header">
        <div>
            <h1>Workflow Runs</h1>
            <p class="page-subtitle" id="last-updated">Loading…</p>
        </div>
        <div class="dash-controls">
            <div class="auto-refresh-indicator" id="refresh-indicator">
                <span class="pulse-dot"></span>
                <span>Auto-refresh <span id="countdown">10</span>s</span>
            </div>
            <button class="btn btn-ghost" onclick="fetchRuns()" id="refresh-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <div id="error-bar" class="error-bar" style="display:none;"></div>

    <div id="runs-container">
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Fetching workflow runs…</p>
        </div>
    </div>
</div>

<script>
const AUTO_REFRESH = 10;
let countdown = AUTO_REFRESH;
let timer = null;

function startCountdown() {
    countdown = AUTO_REFRESH;
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = countdown;
        if (countdown <= 0) {
            fetchRuns();
        }
    }, 1000);
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    const diff = Math.max(0, Math.floor((now - then) / 1000));
    if (diff < 60) return 'just now';
    if (diff < 3600) {
        const m = Math.floor(diff / 60);
        return m + 'm ago';
    }
    if (diff < 86400) {
        const h = Math.floor(diff / 3600);
        return h + 'h ago';
    }
    const d = Math.floor(diff / 86400);
    return d + 'd ago';
}

function getBarClass(run) {
    if (run.status === 'in_progress' || run.status === 'queued' || run.status === 'waiting' || run.status === 'pending') return 'bar-running';
    if (run.conclusion === 'success') return 'bar-success';
    if (run.conclusion === 'failure') return 'bar-failure';
    return 'bar-failure';
}

async function fetchRuns() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('spinning');

    try {
        const resp = await fetch('/api/runs');
        const data = await resp.json();
        const runs = data.runs || [];
        renderCards(runs);

        const ts = new Date(data.updated_at);
        document.getElementById('last-updated').textContent =
            'Updated ' + ts.toLocaleTimeString();

        if (data.errors && data.errors.length > 0) {
            const bar = document.getElementById('error-bar');
            bar.innerHTML = data.errors.map(e => `<span>${e}</span>`).join('');
            bar.style.display = 'block';
        } else {
            document.getElementById('error-bar').style.display = 'none';
        }
    } catch (e) {
        console.error('Fetch failed:', e);
        document.getElementById('error-bar').textContent = 'Failed to fetch runs.';
        document.getElementById('error-bar').style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.classList.remove('spinning');
        startCountdown();
    }
}

function renderCards(runs) {
    // Group runs by repo, keep only latest 2 per repo
    const byRepo = {};
    const repoMeta = {};
    for (const run of runs) {
        const key = run.repo_full_name;
        if (!byRepo[key]) byRepo[key] = [];
        if (byRepo[key].length < 2) byRepo[key].push(run);
        if (!repoMeta[key]) {
            const org = key.split('/')[0];
            repoMeta[key] = { org, avatar: run.owner_avatar_url || '' };
        }
    }

    const container = document.getElementById('runs-container');

    const repos = Object.keys(byRepo).sort();
    if (repos.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <h2>No workflow runs found</h2>
                <p>Runs will appear here once your workflows execute.</p>
            </div>`;
        return;
    }

    // Group repos by org, preserving sort order
    const byOrg = {};
    const orgAvatars = {};
    for (const repo of repos) {
        const { org, avatar } = repoMeta[repo];
        if (!byOrg[org]) byOrg[org] = [];
        byOrg[org].push(repo);
        if (!orgAvatars[org] && avatar) orgAvatars[org] = avatar;
    }

    let html = '';
    const orgs = Object.keys(byOrg).sort();
    for (const org of orgs) {
        const avatarUrl = orgAvatars[org] || '';
        const avatarImg = avatarUrl
            ? `<img src="${avatarUrl}" alt="" class="org-avatar" onerror="this.style.display='none'">`
            : '';

        html += `
        <div class="org-section">
            <div class="org-header">
                ${avatarImg}
                <span class="org-name">${org}</span>
            </div>
            <div class="repo-card-grid">`;

        for (const repo of byOrg[org]) {
            const repoRuns = byRepo[repo];
            const repoName = repo.split('/')[1];
            let barsHtml = '';
            for (const run of repoRuns) {
                const cls = getBarClass(run);
                const ago = timeAgo(run.created_at);
                barsHtml += `
                    <div class="build-row">
                        <a href="${run.html_url}" target="_blank" rel="noopener" class="build-bar ${cls}">
                            <span class="build-bar-fill"></span>
                        </a>
                        <span class="build-ago">${ago}</span>
                    </div>`;
            }
            if (repoRuns.length < 2) {
                barsHtml += `
                    <div class="build-row">
                        <div class="build-bar bar-empty"><span class="build-bar-fill"></span></div>
                        <span class="build-ago"></span>
                    </div>`;
            }

            html += `
            <div class="dash-card">
                <div class="dash-card-name">${repoName}</div>
                <div class="dash-card-builds">${barsHtml}</div>
            </div>`;
        }

        html += `</div></div>`;
    }

    container.innerHTML = html;
}

// Initial load
fetchRuns();
</script>
{% endblock %}
